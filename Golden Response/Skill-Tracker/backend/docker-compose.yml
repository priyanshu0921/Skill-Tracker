version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: skill-tracker-postgres
    environment:
      POSTGRES_DB: skilltracker
      POSTGRES_USER: skilltracker
      POSTGRES_PASSWORD: skilltracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
